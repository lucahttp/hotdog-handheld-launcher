# Gaming Mode Optimization for Panchito Launcher
# Based on OptimizerNXT YAML format
# Compatible with Windows 10/11
# 
# Apply with: optimizerNXT.exe apply "gaming-mode.yaml"
# Rollback with: rollback.bat

jobs:
  # =============================================
  # 1. DISABLE TELEMETRY & DATA COLLECTION
  # =============================================
  - name: "Disable Telemetry Services"
    description: "Stop and disable telemetry services"
    steps:
      - name: "Stop Telemetry Services"
        service:
          stop:
            - DiagTrack
            - dmwappushservice
            - DcpSvc
          disable:
            - DiagTrack
            - dmwappushservice
            - DcpSvc

      - name: "Disable CEIP and Telemetry Registry"
        registry:
          entries:
            - hive: HKLM
              path: SOFTWARE\Policies\Microsoft\SQMClient\Windows
              add:
                CEIPEnable: { type: DWord, value: 0 }
            - hive: HKLM
              path: SOFTWARE\Policies\Microsoft\Windows\AppCompat
              add:
                AITEnable: { type: DWord, value: 0 }
                DisableInventory: { type: DWord, value: 1 }
                DisablePCA: { type: DWord, value: 1 }
            - hive: HKLM
              path: SYSTEM\CurrentControlSet\Control\WMI\AutoLogger\SQMLogger
              add:
                Start: { type: DWord, value: 0 }
            - hive: HKLM
              path: SOFTWARE\Policies\Microsoft\Windows\DataCollection
              add:
                AllowTelemetry: { type: DWord, value: 0 }

  # =============================================
  # 2. DISABLE SUPERFETCH / SYSMAIN
  # =============================================
  - name: "Disable Superfetch/SysMain"
    description: "Disable Superfetch which is useless on modern SSDs"
    steps:
      - name: "Stop and Disable SysMain"
        service:
          stop:
            - SysMain
          disable:
            - SysMain

      - name: "Disable Prefetch Parameters"
        registry:
          entries:
            - hive: HKLM
              path: SYSTEM\CurrentControlSet\Control\Session Manager\Memory Management\PrefetchParameters
              add:
                EnableSuperfetch: { type: DWord, value: 0 }
                EnablePrefetcher: { type: DWord, value: 0 }
                SfTracingState: { type: DWord, value: 1 }

  # =============================================
  # 3. DISABLE WINDOWS SEARCH INDEXING
  # =============================================
  - name: "Disable Windows Search"
    description: "Stop file indexing - not needed for gaming"
    steps:
      - name: "Stop and Disable Windows Search"
        service:
          stop:
            - WSearch
          disable:
            - WSearch

  # =============================================
  # 4. DISABLE COPILOT / CORTANA / AI
  # =============================================
  - name: "Disable AI Services"
    description: "Disable Copilot, Cortana and AI features"
    condition:
      windows: [10, 11]
    steps:
      - name: "Disable Windows Copilot"
        registry:
          entries:
            - hive: HKCU
              path: Software\Policies\Microsoft\Windows\WindowsCopilot
              add:
                TurnOffWindowsCopilot: { type: DWord, value: 1 }
            - hive: HKLM
              path: SOFTWARE\Policies\Microsoft\Windows\WindowsCopilot
              add:
                TurnOffWindowsCopilot: { type: DWord, value: 1 }
            - hive: HKCU
              path: Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
              add:
                ShowCopilotButton: { type: DWord, value: 0 }

      - name: "Disable Cortana and Web Search"
        registry:
          entries:
            - hive: HKLM
              path: SOFTWARE\Policies\Microsoft\Windows\Windows Search
              add:
                AllowCortana: { type: DWord, value: 0 }
                DisableWebSearch: { type: DWord, value: 1 }
                ConnectedSearchUseWeb: { type: DWord, value: 0 }
            - hive: HKCU
              path: Software\Microsoft\Windows\CurrentVersion\Search
              add:
                CortanaConsent: { type: DWord, value: 0 }
                BingSearchEnabled: { type: DWord, value: 0 }

  # =============================================
  # 5. DISABLE WINDOWS UPDATES
  # =============================================
  - name: "Disable Windows Updates"
    description: "Prevent Windows from updating during gaming"
    steps:
      - name: "Stop and Disable Update Services"
        service:
          stop:
            - wuauserv
            - UsoSvc
            - WaaSMedicSvc
          disable:
            - wuauserv
            - UsoSvc
            - WaaSMedicSvc

      - name: "Disable Automatic Updates Registry"
        registry:
          entries:
            - hive: HKLM
              path: SOFTWARE\Policies\Microsoft\Windows\WindowsUpdate\AU
              add:
                NoAutoUpdate: { type: DWord, value: 1 }
                AUOptions: { type: DWord, value: 1 }
            - hive: HKLM
              path: SOFTWARE\Microsoft\Windows\CurrentVersion\DeliveryOptimization\Config
              add:
                DODownloadMode: { type: DWord, value: 0 }

  # =============================================
  # 6. DISABLE ONEDRIVE
  # =============================================
  - name: "Disable OneDrive"
    description: "Disable OneDrive sync - not needed for gaming"
    steps:
      - name: "Disable OneDrive Sync"
        registry:
          entries:
            - hive: HKLM
              path: SOFTWARE\Policies\Microsoft\Windows\OneDrive
              add:
                DisableFileSyncNGSC: { type: DWord, value: 1 }

  # =============================================
  # 7. PERFORMANCE TWEAKS
  # =============================================
  - name: "Enable Performance Tweaks"
    description: "System performance optimizations"
    steps:
      - name: "Disable Network Throttling"
        registry:
          entries:
            - hive: HKLM
              path: SOFTWARE\Microsoft\Windows NT\CurrentVersion\Multimedia\SystemProfile
              add:
                NetworkThrottlingIndex: { type: DWord, value: 4294967295 }

      - name: "Set NonBestEffortLimit for Background"
        registry:
          entries:
            - hive: HKLM
              path: SOFTWARE\Policies\Microsoft\Windows\Psched
              add:
                NonBestEffortLimit: { type: DWord, value: 0 }

      - name: "Disable Transparency and Animations"
        registry:
          entries:
            - hive: HKCU
              path: Software\Microsoft\Windows\CurrentVersion\Themes\Personalize
              add:
                EnableTransparency: { type: DWord, value: 0 }
            - hive: HKCU
              path: Control Panel\Desktop
              add:
                AutoEndTasks: { type: String, value: "1" }
                HungAppTimeout: { type: String, value: "1000" }
                WaitToKillAppTimeout: { type: String, value: "2000" }

      - name: "Disable Remote Assistance"
        registry:
          entries:
            - hive: HKLM
              path: System\CurrentControlSet\Control\Remote Assistance
              add:
                fAllowToGetHelp: { type: DWord, value: 0 }

      - name: "Set Service Wait Timeout"
        registry:
          entries:
            - hive: HKLM
              path: SYSTEM\CurrentControlSet\Control
              add:
                WaitToKillServiceTimeout: { type: String, value: "2000" }

  # =============================================
  # 8. PRIVACY HARDENING
  # =============================================
  - name: "Privacy Hardening"
    description: "Disable advertising, feedback, location"
    steps:
      - name: "Disable Advertising ID and Tailored Experiences"
        registry:
          entries:
            - hive: HKCU
              path: Software\Microsoft\Windows\CurrentVersion\AdvertisingInfo
              add:
                Enabled: { type: DWord, value: 0 }
            - hive: HKCU
              path: Software\Microsoft\Windows\CurrentVersion\ContentDeliveryManager
              add:
                DisableWindowsSpotlightFeatures: { type: DWord, value: 1 }
                DisableTailoredExperiencesWithDiagnosticData: { type: DWord, value: 1 }
            - hive: HKLM
              path: SOFTWARE\Policies\Microsoft\Windows\AdvertisingInfo
              add:
                DisabledByGroupPolicy: { type: DWord, value: 1 }

      - name: "Disable Feedback and Diagnostics"
        registry:
          entries:
            - hive: HKLM
              path: SOFTWARE\Policies\Microsoft\Windows\Windows Error Reporting
              add:
                Disabled: { type: DWord, value: 1 }
            - hive: HKLM
              path: SOFTWARE\Policies\Microsoft\PCHealth\ErrorReporting
              add:
                DoReport: { type: DWord, value: 0 }

  # =============================================
  # 9. SIMPLIFY WINDOWS 11 UI
  # =============================================
  - name: "Simplify Windows 11"
    description: "Clean up Windows 11 taskbar and UI"
    condition:
      windows: [11]
    steps:
      - name: "Taskbar Cleanup"
        registry:
          entries:
            - hive: HKCU
              path: Software\Microsoft\Windows\CurrentVersion\Explorer\Advanced
              add:
                TaskbarAl: { type: DWord, value: 0 }
                TaskbarMn: { type: DWord, value: 0 }
            - hive: HKCU
              path: Control Panel\Desktop
              add:
                DockMoving: { type: String, value: "0" }

      - name: "Disable Meet Now"
        registry:
          entries:
            - hive: HKCU
              path: Software\Microsoft\Windows\CurrentVersion\Policies\Explorer
              add:
                HideSCAMeetNow: { type: DWord, value: 1 }

  # =============================================
  # 10. DISABLE GAMEDVR (Screen Recording)
  # =============================================
  - name: "Disable GameDVR"
    description: "Disable GameDVR screen recording - saves resources"
    steps:
      - name: "Disable GameDVR Registry"
        registry:
          entries:
            - hive: HKLM
              path: SOFTWARE\Policies\Microsoft\Windows\GameDVR
              add:
                AllowGameDVR: { type: DWord, value: 0 }
            - hive: HKCU
              path: Software\Microsoft\Windows\CurrentVersion\GameDVR
              add:
                GameDVR_Enabled: { type: DWord, value: 0 }
            - hive: HKCU
              path: Software\Microsoft\Windows\CurrentVersion\GameConfigStore
              add:
                GameDVR_Enabled: { type: DWord, value: 0 }

  # =============================================
  # 11. DISABLE PRINTER SPOOLER
  # =============================================
  - name: "Disable Print Spooler"
    description: "No printer needed on gaming handheld"
    steps:
      - name: "Stop and Disable Print Spooler"
        service:
          stop:
            - Spooler
          disable:
            - Spooler

  # =============================================
  # 12. DISABLE SECONDARY LOGON
  # =============================================
  - name: "Disable Secondary Logon"
    description: "Security hardening"
    steps:
      - name: "Disable Secondary Logon Service"
        service:
          stop:
            - seclogon
          disable:
            - seclogon